<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
  <title>Stock Counter AI</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  
  <style>
    /* ใช้ CSS เดิมของคุณเป็นหลัก และปรับแต่งเพิ่มส่วนปุ่มอัปโหลด */
    :root { --accent: #2c2c2c; --border: #e0ddd6; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #fafafa; color: #1a1a1a; padding: 0; }
    .app { max-width: 430px; margin: 0 auto; min-height: 100vh; background: #fff; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
    
    .header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .app-title { font-size: 18px; font-weight: 700; }
    .total-badge { background: var(--accent); color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 12px; }

    .scanner-section { padding: 16px; border-bottom: 8px solid #f5f5f5; }
    #scannerWrap { background: #000; border-radius: 12px; overflow: hidden; height: 160px; position: relative; border: 1px solid var(--border); }
    .scanner-placeholder { height: 100%; display: flex; align-items: center; justify-content: center; color: #666; font-size: 13px; background: #f9f9f9; }
    
    .btn-group { display: flex; gap: 8px; margin-top: 12px; }
    .btn-main { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 600; cursor: pointer; transition: 0.2s; }
    .btn-scan { background: var(--accent); color: #fff; }
    .btn-photo { background: #fff; border: 1.5px solid var(--accent); color: var(--accent); }
    
    .status-bar { padding: 8px 16px; font-size: 12px; color: #666; display: flex; align-items: center; gap: 6px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; }
    .dot.active { background: #22c55e; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

    .table-section { padding: 16px; }
    .item-card { display: flex; align-items: center; padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; gap: 10px; }
    .item-info { flex: 1; }
    .item-name { font-weight: 600; font-size: 14px; text-transform: uppercase; }
    .item-meta { font-size: 11px; color: #888; margin-top: 2px; }
    
    .qty-ctrl { display: flex; align-items: center; gap: 8px; background: #f5f5f5; padding: 4px; border-radius: 8px; }
    .btn-qty { width: 26px; height: 26px; border: none; background: #fff; border-radius: 4px; cursor: pointer; font-weight: bold; }
    
    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; z-index: 1000; }
    .modal-overlay.show { display: flex; }
    .modal { background: #fff; width: 100%; border-radius: 20px 20px 0 0; padding: 24px; max-width: 430px; margin: 0 auto; }
    .form-input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 12px; font-size: 15px; background: #fcfcfc; }
    .btn-save { width: 100%; background: var(--accent); color: #fff; padding: 14px; border: none; border-radius: 10px; font-weight: 600; font-size: 16px; }
    
    /* Loading Overlay */
    #loading { position: fixed; inset: 0; background: rgba(255,255,255,0.8); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; font-weight: 600; }
  </style>
</head>
<body>

<div id="loading">กำลังประมวลผลรูปถ่าย...</div>

<div class="app">
  <div class="header">
    <div class="app-title">Stock Counter AI</div>
    <div class="total-badge" id="totalBadge">0 items</div>
  </div>

  <div class="scanner-section">
    <div id="scannerWrap">
      <div class="scanner-placeholder" id="placeholder">กล้องปิดอยู่</div>
      <div id="reader"></div>
    </div>
    
    <div class="btn-group">
      <button class="btn-main btn-scan" id="scanBtn" onclick="toggleScanner()">เริ่มสแกนสด</button>
      <button class="btn-main btn-photo" onclick="document.getElementById('fileInput').click()">ถ่ายรูปป้าย</button>
      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="processImage(this)">
    </div>
  </div>

  <div class="status-bar">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">พร้อมใช้งาน</span>
  </div>

  <div class="table-section">
    <div id="itemsList"></div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <h3 style="margin-bottom: 15px;">บันทึกสินค้าใหม่</h3>
    <label style="font-size: 11px; color: #888;">JANCODE / BARCODE</label>
    <input class="form-input" id="inputBarcode" placeholder="Barcode">
    
    <label style="font-size: 11px; color: #888;">ชื่อสินค้า (NAME)</label>
    <input class="form-input" id="inputName" placeholder="Product Name">
    
    <label style="font-size: 11px; color: #888;">สี / รายละเอียด (COLOR/DETAIL)</label>
    <input class="form-input" id="inputDetail" placeholder="Color or Detail">
    
    <button class="btn-save" onclick="saveItem()">ยืนยันและเพิ่มจำนวน</button>
    <button onclick="closeModal()" style="width:100%; background:none; border:none; color:#aaa; margin-top:10px; cursor:pointer;">ยกเลิก</button>
  </div>
</div>

<script>
  let items = JSON.parse(localStorage.getItem('stock_ai_v1') || '[]');
  let html5QrCode = null;
  let isScanning = false;

  // --- 1. ระบบดึงข้อมูลจากรูป (OCR) ---
  async function processImage(input) {
    if (!input.files || !input.files[0]) return;
    
    const loading = document.getElementById('loading');
    loading.style.display = 'flex';
    document.getElementById('statusText').textContent = 'กำลังอ่านข้อมูลจากรูป...';

    try {
      // ใช้ Tesseract.js อ่านข้อความจากรูป
      const result = await Tesseract.recognize(input.files[0], 'eng');
      const text = result.data.text;
      console.log("Raw Text:", text); // เช็ค log ดูว่าอ่านอะไรได้บ้าง

      // --- ดึงข้อมูลด้วย Regex ---
      // 1. หา JANCODE (ตัวเลข 13 หลัก)
      const jancodeMatch = text.match(/\d{13}/);
      const jancode = jancodeMatch ? jancodeMatch[0] : "";

      // 2. หาชื่อสินค้า (สมมติว่าเป็นบรรทัดที่คำตัวพิมพ์ใหญ่เยอะๆ หรือบรรทัดแรกๆ)
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 3);
      let name = "";
      let color = "";

      // ค้นหาสี (RED, BLUE, BLACK ฯลฯ)
      const colorKeywords = ['RED', 'BLUE', 'BLACK', 'WHITE', 'GREEN', 'NAVY', 'YELLOW', 'PINK'];
      
      lines.forEach(line => {
        // ถ้าบรรทัดไหนมีสี ให้ดึงเป็นสี
        colorKeywords.forEach(k => {
          if (line.toUpperCase().includes(k)) color = line;
        });
        // บรรทัดที่เป็นชื่อมักจะเป็น PEN CASE หรือตัวใหญ่ล้วน
        if (line.match(/^[A-Z\s]+$/) && line.length > 5 && !name) {
          name = line;
        }
      });

      // ถ้าสแกนเจอสินค้าที่มีอยู่แล้ว ให้บวกเพิ่มเลย
      if (jancode && items.find(i => i.barcode === jancode)) {
        onScanSuccess(jancode);
      } else {
        // ถ้าเป็นของใหม่ ให้เปิด Modal พร้อมกรอกค่าที่เดาได้ลงไป
        openModal(jancode, name, color);
      }

    } catch (e) {
      alert("ไม่สามารถอ่านรูปภาพได้ชัดเจน กรุณาลองใหม่");
    } finally {
      loading.style.display = 'none';
      document.getElementById('statusText').textContent = 'พร้อมใช้งาน';
      input.value = ""; // clear input
    }
  }

  // --- 2. ฟังก์ชันพื้นฐานของแอป ---
  function render() {
    const list = document.getElementById('itemsList');
    const total = items.reduce((s, i) => s + i.count, 0);
    document.getElementById('totalBadge').textContent = total + ' items';

    if (items.length === 0) {
      list.innerHTML = '<div style="text-align:center; padding:40px; color:#ccc;">ไม่มีรายการสินค้า</div>';
      return;
    }

    list.innerHTML = items.map(item => `
      <div class="item-card">
        <div class="item-info">
          <div class="item-name">${item.name || 'UNKNOWN'}</div>
          <div class="item-meta">${item.barcode} | ${item.detail || '-'}</div>
        </div>
        <div class="qty-ctrl">
          <button class="btn-qty" onclick="adjust('${item.barcode}', -1)">-</button>
          <span style="font-weight:700; min-width:20px; text-align:center;">${item.count}</span>
          <button class="btn-qty" onclick="adjust('${item.barcode}', 1)">+</button>
        </div>
      </div>
    `).join('');
  }

  function onScanSuccess(code) {
    const existing = items.find(i => i.barcode === code);
    if (existing) {
      existing.count++;
      save();
      document.getElementById('statusText').textContent = `นับแล้ว: ${existing.name}`;
      if (navigator.vibrate) navigator.vibrate(80);
    } else {
      openModal(code, "", "");
      if (isScanning) toggleScanner();
    }
  }

  function openModal(bc = "", name = "", detail = "") {
    document.getElementById('inputBarcode').value = bc;
    document.getElementById('inputName').value = name;
    document.getElementById('inputDetail').value = detail;
    document.getElementById('modal').classList.add('show');
  }

  function saveItem() {
    const barcode = document.getElementById('inputBarcode').value.trim();
    const name = document.getElementById('inputName').value.trim();
    const detail = document.getElementById('inputDetail').value.trim();

    if (!barcode || !name) { alert("กรุณาระบุ Barcode และชื่อสินค้า"); return; }

    items.unshift({ barcode, name, detail, count: 1 });
    save();
    closeModal();
  }

  function adjust(barcode, delta) {
    const item = items.find(i => i.barcode === barcode);
    if (item) {
      item.count = Math.max(0, item.count + delta);
      save();
    }
  }

  function save() {
    localStorage.setItem('stock_ai_v1', JSON.stringify(items));
    render();
  }

  function closeModal() { document.getElementById('modal').classList.remove('show'); }

  async function toggleScanner() {
    const btn = document.getElementById('scanBtn');
    const dot = document.getElementById('statusDot');
    if (!isScanning) {
      html5QrCode = new Html5Qrcode("reader");
      document.getElementById('placeholder').style.display = 'none';
      await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess);
      isScanning = true;
      btn.textContent = "หยุดสแกน";
      dot.classList.add('active');
    } else {
      await html5QrCode.stop();
      isScanning = false;
      btn.textContent = "เริ่มสแกนสด";
      dot.classList.remove('active');
      document.getElementById('placeholder').style.display = 'flex';
    }
  }

  render();
</script>
</body>
</html>
