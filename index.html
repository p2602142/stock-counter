<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
  <title>Stock Pro V13</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  
  <style>
    :root {
      --bg: #f8f9fa; --surface: #ffffff; --primary: #1a1a1a; --accent: #2563eb;
      --danger: #dc2626; --border: #e5e7eb; --text: #111; --text-light: #6b7280;
      --nav-h: 75px; --safe-area: 16px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121212; --surface: #1e1e1e; --primary: #ffffff; --accent: #60a5fa;
        --danger: #ef4444; --border: #333; --text: #eeeeee; --text-light: #a1a1aa;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; -webkit-tap-highlight-color: transparent; }
    body { background: var(--bg); color: var(--text); overflow-x: hidden; }
    .app { max-width: 480px; margin: 0 auto; min-height: 100vh; background: var(--surface); display: flex; flex-direction: column; padding-bottom: var(--nav-h); }

    /* Sticky Header */
    header { padding: 18px var(--safe-area); border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 100; display: flex; justify-content: space-between; align-items: center; }
    .total-badge { background: var(--accent); color: #fff; padding: 6px 14px; border-radius: 20px; font-size: 14px; font-weight: 800; }

    /* Tabs Content */
    .tab-content { display: none; flex: 1; padding: 0 var(--safe-area); animation: fadeIn 0.2s ease; }
    .tab-content.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    /* SCANNER TAB */
    #scannerWrap { background: #000; border-radius: 20px; overflow: hidden; height: 350px; position: relative; margin: 20px 0; border: 2px solid var(--border); }
    #reader { width: 100% !important; height: 100% !important; }

    /* INVENTORY TAB - One Handed & Sorting */
    .search-area { padding: 16px 0; position: sticky; top: 65px; background: var(--surface); z-index: 90; }
    .search-box { width: 100%; padding: 14px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 16px; outline: none; background: var(--bg); color: var(--text); }
    
    .item-card { display: flex; align-items: center; padding: 16px 0; border-bottom: 1px solid var(--border); }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-weight: 700; font-size: 16px; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-meta { font-size: 12px; color: var(--text-light); font-family: monospace; }
    
    /* Large Tap Targets (Min 44px) */
    .qty-controls { display: flex; align-items: center; gap: 10px; }
    .btn-q { width: 46px; height: 46px; border: none; background: var(--bg); color: var(--text); border-radius: 12px; font-weight: 800; font-size: 18px; transition: active 0.1s; border: 1px solid var(--border); }
    .btn-q:active { transform: scale(0.9); background: var(--border); }

    /* UNDO Toast */
    #undoToast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--primary); color: var(--surface); padding: 12px 20px; border-radius: 30px; font-size: 13px; font-weight: 700; display: none; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.3); align-items: center; gap: 12px; }

    /* Bulk Buttons & Export */
    .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
    .btn { height: 52px; border-radius: 14px; border: none; font-weight: 700; cursor: pointer; font-size: 14px; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-main { background: var(--primary); color: var(--surface); }
    .btn-alt { background: var(--bg); color: var(--text); border: 1px solid var(--border); }

    /* Navigation */
    nav { position: fixed; bottom: 0; width: 100%; max-width: 480px; height: var(--nav-h); background: var(--surface); border-top: 1px solid var(--border); display: flex; z-index: 200; padding-bottom: 10px; }
    .nav-btn { flex: 1; border: none; background: none; color: var(--text-light); font-weight: 800; font-size: 11px; text-transform: uppercase; }
    .nav-btn.active { color: var(--accent); border-top: 3px solid var(--accent); }

    /* Modal */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: flex-end; z-index: 1000; backdrop-filter: blur(4px); }
    .overlay.show { display: flex; }
    .modal { background: var(--surface); width: 100%; border-radius: 24px 24px 0 0; padding: 24px; max-width: 480px; margin: 0 auto; box-shadow: 0 -5px 25px rgba(0,0,0,0.2); }
    .input { width: 100%; padding: 16px; border: 1.5px solid var(--border); border-radius: 12px; margin-bottom: 16px; font-size: 16px; background: var(--bg); color: var(--text); outline: none; }
    .input:focus { border-color: var(--accent); }
  </style>
</head>
<body>

<div class="app">
  <header>
    <h1 id="tabTitle" style="font-size: 18px; font-weight: 900; letter-spacing: 1px;">SCANNER</h1>
    <div id="totalBadge" class="total-badge">0 ITEMS</div>
  </header>

  <div id="scannerTab" class="tab-content active">
    <div id="scannerWrap"><div id="reader"></div></div>
    <button class="btn btn-main" id="scanBtn" onclick="toggleScanner()">START SCANNER</button>
    <div style="margin-top: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
      <button class="btn btn-alt" onclick="document.getElementById('fileIn').click()">FILE</button>
      <button class="btn btn-alt" onclick="openModal()">MANUAL ADD</button>
    </div>
    <input type="file" id="fileIn" accept="image/*" style="display:none" onchange="decodeFile(this)">
  </div>

  <div id="inventoryTab" class="tab-content">
    <div class="search-area">
      <input type="text" id="searchInput" class="search-box" placeholder="Real-time search..." oninput="render()">
    </div>
    <div id="itemsList"></div>
    <div class="action-grid">
      <button class="btn btn-alt" onclick="exportCSV()">EXPORT CSV</button>
      <button class="btn btn-alt" onclick="copyToClipboard()">COPY TO LINE</button>
      <button class="btn btn-alt" onclick="exportTxtReport()">EXPORT TXT</button>
      <button class="btn btn-main" style="background:var(--danger)" onclick="clearData()">RESET ALL</button>
    </div>
  </div>

  <div id="auditTab" class="tab-content">
    <div id="logsList" style="padding-top:16px;"></div>
  </div>
</div>

<div id="undoToast">
  <span id="undoMsg">Action completed</span>
  <button onclick="undo()" style="background:var(--accent); color:white; border:none; padding:4px 12px; border-radius:12px; font-weight:800;">UNDO</button>
</div>

<nav>
  <button class="nav-btn active" onclick="switchTab('scanner', this)">SCAN</button>
  <button class="nav-btn" onclick="switchTab('inventory', this)">STOCK</button>
  <button class="nav-btn" onclick="switchTab('audit', this)">LOG</button>
</nav>

<div class="overlay" id="modal">
  <div class="modal">
    <h2 style="margin-bottom: 20px; font-weight: 900;">PRODUCT INFO</h2>
    <input class="input" id="inBarcode" placeholder="Barcode (Scan or Type)">
    <input class="input" id="inName" placeholder="Product Name *">
    <input class="input" id="inDetail" placeholder="Color / Size">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <button class="btn btn-alt" onclick="closeModal()">CANCEL</button>
        <button class="btn btn-main" id="saveBtn" onclick="saveData()">SAVE</button>
    </div>
  </div>
</div>

<script>
  let inventory = JSON.parse(localStorage.getItem('stock_v13_inv') || '[]');
  let logs = JSON.parse(localStorage.getItem('stock_v13_logs') || '[]');
  let lastState = null;
  let html5Scanner = null;
  let isScanning = false;

  // Haptic Feedback Helper
  function haptic(type = 'light') {
    if (!window.navigator.vibrate) return;
    if (type === 'light') window.navigator.vibrate(20);
    else if (type === 'medium') window.navigator.vibrate(50);
    else if (type === 'error') window.navigator.vibrate([50, 30, 50]);
  }

  function addLog(type, msg) {
    const time = new Date().toLocaleTimeString('en-GB');
    logs.unshift({ type, msg, time });
    if (logs.length > 50) logs.pop();
    localStorage.setItem('stock_v13_logs', JSON.stringify(logs));
    renderLogs();
  }

  function save() {
    // Auto-Sort: Most recently updated at top
    localStorage.setItem('stock_v13_inv', JSON.stringify(inventory));
    render();
  }

  function switchTab(tab, btn) {
    if (tab !== 'scanner' && isScanning) stopScanner();
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tab + 'Tab').classList.add('active');
    btn.classList.add('active');
    document.getElementById('tabTitle').textContent = tab.toUpperCase();
    if(tab === 'inventory') render();
    if(tab === 'audit') renderLogs();
  }

  function render() {
    const list = document.getElementById('itemsList');
    const query = document.getElementById('searchInput').value.toLowerCase();
    
    // Total Badge
    const total = inventory.reduce((s, i) => s + i.count, 0);
    document.getElementById('totalBadge').textContent = `${total} ITEMS`;

    const filtered = inventory.filter(i => 
      i.name.toLowerCase().includes(query) || i.barcode.includes(query) || (i.detail && i.detail.toLowerCase().includes(query))
    );

    list.innerHTML = filtered.map((item, idx) => `
      <div class="item-card">
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-meta">${item.barcode} ${item.detail ? '| '+item.detail : ''}</div>
          <div style="margin-top:6px;">
             <button onclick="removeItem(${idx})" style="color:var(--danger); font-size:10px; font-weight:800; border:none; background:none;">DELETE ITEM</button>
          </div>
        </div>
        <div class="qty-controls">
          <button class="btn-q" onclick="adjust(${idx}, -1)">-</button>
          <span style="font-weight:900; font-size:18px; min-width:30px; text-align:center;">${item.count}</span>
          <button class="btn-q" onclick="adjust(${idx}, 1)">+</button>
          <button class="btn-q" style="width:auto; padding:0 10px; font-size:12px;" onclick="adjust(${idx}, 10)">+10</button>
        </div>
      </div>
    `).join('');
  }

  function renderLogs() {
    const list = document.getElementById('logsList');
    list.innerHTML = logs.map(l => `
      <div style="padding:10px 0; border-bottom:1px solid var(--border); font-size:13px;">
        <span style="color:var(--text-light); font-size:11px;">${l.time}</span> | <b>${l.type}</b>: ${l.msg}
      </div>
    `).join('');
  }

  // Scanner Logic
  async function toggleScanner() {
    if (!isScanning) {
      html5Scanner = new Html5Qrcode("reader");
      await html5Scanner.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, onScanSuccess);
      isScanning = true;
      document.getElementById('scanBtn').textContent = "STOP SCANNER";
      haptic('medium');
    } else { stopScanner(); }
  }

  function stopScanner() {
    if (html5Scanner) html5Scanner.stop();
    isScanning = false;
    document.getElementById('scanBtn').textContent = "START SCANNER";
  }

  function onScanSuccess(code) {
    haptic('light');
    const idx = inventory.findIndex(i => i.barcode === code);
    if (idx !== -1) {
      inventory[idx].count++;
      // Move to top (Auto-sort)
      const item = inventory.splice(idx, 1)[0];
      inventory.unshift(item);
      addLog('SCAN', `+1 ${item.name}`);
      save();
    } else {
      stopScanner();
      openModal(code);
    }
  }

  // Data Actions
  function adjust(idx, delta) {
    lastState = JSON.parse(JSON.stringify(inventory)); // Store for undo
    inventory[idx].count = Math.max(0, inventory[idx].count + delta);
    
    // Move to top
    const item = inventory.splice(idx, 1)[0];
    inventory.unshift(item);
    
    haptic('light');
    save();
    showUndoToast(`Adjusted ${item.name}`);
  }

  function undo() {
    if (lastState) {
      inventory = lastState;
      save();
      document.getElementById('undoToast').style.display = 'none';
      addLog('UNDO', 'Reverted last action');
    }
  }

  function showUndoToast(msg) {
    const toast = document.getElementById('undoToast');
    document.getElementById('undoMsg').textContent = msg;
    toast.style.display = 'flex';
    setTimeout(() => toast.style.display = 'none', 4000);
  }

  function openModal(code = '') {
    document.getElementById('inBarcode').value = code;
    document.getElementById('inName').value = '';
    document.getElementById('modal').classList.add('show');
    haptic('light');
    setTimeout(() => document.getElementById('inName').focus(), 300); // Auto-focus
  }

  function closeModal() { document.getElementById('modal').classList.remove('show'); }

  function saveData() {
    const name = document.getElementById('inName').value.trim();
    if (!name) return haptic('error');
    
    inventory.unshift({
      barcode: document.getElementById('inBarcode').value,
      name: name,
      detail: document.getElementById('inDetail').value,
      count: 1,
      ts: Date.now()
    });
    addLog('ADD', `New Item: ${name}`);
    save();
    closeModal();
    switchTab('inventory', document.querySelectorAll('.nav-btn')[1]);
  }

  function removeItem(idx) {
    if (confirm("Delete this product permanently?")) {
      addLog('DEL', `Removed ${inventory[idx].name}`);
      inventory.splice(idx, 1);
      save();
      haptic('medium');
    }
  }

  function clearData() {
    if (confirm("DANGER: This will delete ALL stock data. Are you sure?")) {
      inventory = [];
      save();
      addLog('RESET', 'Full database wipe');
      haptic('error');
    }
  }

  // Export & Sharing
  function copyToClipboard() {
    const text = inventory.map(i => `${i.name}${i.detail?'('+i.detail+')':''}: ${i.count}`).join('\n');
    navigator.clipboard.writeText(text);
    alert("Copied to clipboard! You can now paste in LINE.");
    addLog('COPY', 'Shared to clipboard');
  }

  function exportCSV() {
    let csv = "Barcode,Name,Detail,Quantity\n";
    inventory.forEach(i => {
      csv += `"${i.barcode}","${i.name}","${i.detail}",${i.count}\n`;
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `Stock_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
  }

  function exportTxtReport() {
    let report = `STOCK REPORT - ${new Date().toLocaleString()}\n\n`;
    inventory.forEach(i => report += `[${i.barcode}] ${i.name} (${i.detail || '-'}): ${i.count}\n`);
    const blob = new Blob([report], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Report.txt`;
    a.click();
  }

  // Startup
  render();
</script>
</body>
</html>
