<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
  <title>Stock Counter AI Pro</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/4.1.1/tesseract.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>
  
  <style>
    :root { --bg: #fcfcfb; --surface: #ffffff; --border: #e0ddd6; --accent: #1a1a1a; --primary: #2563eb; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: #1a1a1a; }
    .app { max-width: 430px; margin: 0 auto; min-height: 100vh; background: #fff; position: relative; box-shadow: 0 0 20px rgba(0,0,0,0.05); }
    
    .header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .app-title { font-size: 18px; font-weight: 800; }
    .total-badge { background: var(--accent); color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 700; }

    .scanner-section { padding: 16px; border-bottom: 8px solid #f8f7f5; }
    #scannerWrap { background: #000; border-radius: 16px; overflow: hidden; height: 200px; position: relative; border: 1px solid var(--border); }
    .placeholder { height: 100%; display: flex; align-items: center; justify-content: center; color: #888; background: #fafafa; font-size: 13px; font-weight: 600; }
    
    .controls { display: flex; gap: 8px; margin-top: 12px; }
    .btn { flex: 1; padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; font-size: 13px; transition: 0.2s; }
    .btn-main { background: var(--accent); color: #fff; }
    .btn-alt { background: #fff; border: 1.5px solid var(--accent); color: var(--accent); }
    
    .status-bar { padding: 10px 16px; font-size: 11px; color: #666; display: flex; align-items: center; gap: 8px; font-weight: 700; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; }
    .dot.active { background: #22c55e; animation: blink 1.5s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .list-container { padding: 0 16px 100px; }
    .item-card { display: flex; align-items: center; padding: 16px 0; border-bottom: 1px solid #f0f0f0; gap: 12px; }
    .item-info { flex: 1; min-width: 0; }
    .item-name { font-weight: 700; font-size: 15px; text-transform: uppercase; }
    .item-meta { font-size: 11px; color: #999; font-family: monospace; }
    
    .qty-box { display: flex; align-items: center; gap: 6px; background: #f5f5f5; padding: 4px; border-radius: 10px; }
    .btn-q { width: 30px; height: 30px; border: none; background: #fff; border-radius: 8px; font-weight: 800; cursor: pointer; }
    .qty-val { min-width: 25px; text-align: center; font-weight: 800; }

    /* Modal Styling */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: flex-end; z-index: 1000; }
    .overlay.show { display: flex; }
    .modal { background: #fff; width: 100%; border-radius: 28px 28px 0 0; padding: 24px; max-width: 430px; margin: 0 auto; }
    .label { font-size: 10px; font-weight: 800; color: #bbb; margin-bottom: 6px; display: block; text-transform: uppercase; }
    .input { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 16px; font-size: 16px; outline: none; background: #fafafa; font-weight: 600; }
    .btn-save { width: 100%; background: var(--accent); color: #fff; padding: 16px; border: none; border-radius: 14px; font-weight: 800; cursor: pointer; }
    
    #loading { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
    .spinner { width: 30px; height: 30px; border: 3px solid #eee; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div style="font-weight: 800; font-size: 12px;">AI ANALYZING TAG...</div>
</div>

<div class="app">
  <div class="header">
    <div class="app-title">STOCK COUNTER AI</div>
    <div class="total-badge" id="totalBadge">0 items</div>
  </div>

  <div class="scanner-section">
    <div id="scannerWrap">
      <div class="placeholder" id="placeholder">CAMERA PREVIEW</div>
      <div id="reader"></div>
    </div>
    <div class="controls">
      <button class="btn btn-main" id="scanBtn" onclick="toggleScanner()">LIVE SCAN</button>
      <button class="btn btn-alt" onclick="document.getElementById('fileInput').click()">PHOTO TAG</button>
      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="readTag(this)">
    </div>
  </div>

  <div class="status-bar">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">SYSTEM READY</span>
  </div>

  <div class="list-container" id="itemsList"></div>
</div>

<div class="overlay" id="modal">
  <div class="modal">
    <div style="width: 40px; height: 4px; background: #eee; border-radius: 2px; margin: 0 auto 20px;"></div>
    <h2 style="font-size: 20px; font-weight: 800; margin-bottom: 20px;">PRODUCT INFO</h2>
    
    <label class="label">JANCODE / BARCODE</label>
    <input class="input" id="inBarcode" placeholder="Barcode">
    
    <label class="label">PRODUCT NAME</label>
    <input class="input" id="inName" placeholder="Product Name">
    
    <label class="label">COLOR / DETAIL</label>
    <input class="input" id="inDetail" placeholder="Detail">
    
    <button class="btn-save" onclick="saveData()">SAVE & ADD TO STOCK</button>
    <button onclick="closeModal()" style="width:100%; background:none; border:none; color:#aaa; margin-top:15px; font-weight:700; font-size:12px;">DISMISS</button>
  </div>
</div>

<script>
  let inventory = JSON.parse(localStorage.getItem('stock_v2') || '[]');
  let html5QrCode = null;
  let isScanning = false;

  // --- AI TAG READING (OCR) ---
  async function readTag(input) {
    if (!input.files || !input.files[0]) return;
    
    document.getElementById('loading').style.display = 'flex';
    
    try {
      const result = await Tesseract.recognize(input.files[0], 'eng');
      const text = result.data.text;
      const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 1);

      // AI Logic matching your image example:
      let jancode = (text.match(/\d{12,13}/) || [""])[0];
      let nameParts = [];
      let colorDetail = "";

      const colorKeywords = ['RED', 'BLUE', 'BLACK', 'WHITE', 'NAVY', 'YELLOW', 'PINK', 'GREEN'];

      lines.forEach(line => {
        const up = line.toUpperCase();
        
        // 1. Identify Product Name (Lines that are mostly uppercase words like "NYLON", "PEN CASE")
        if (up === line && line.length > 3 && !line.includes('PHP') && !line.match(/\d/)) {
            if (!["MADE IN", "CHINA", "JAPAN"].some(k => up.includes(k))) {
                nameParts.push(line);
            }
        }
        
        // 2. Identify Color/Detail (e.g. "RED" or "W19xH8...")
        if (colorKeywords.some(k => up.includes(k)) || up.match(/W\d+.*H\d+/)) {
            colorDetail += (colorDetail ? ' ' : '') + line;
        }
      });

      // Show in Modal
      openModal(jancode, nameParts.join(' '), colorDetail);

    } catch (err) {
      alert("AI failed to read image. Please try again.");
    } finally {
      document.getElementById('loading').style.display = 'none';
      input.value = "";
    }
  }

  // --- Core Functions ---
  function render() {
    const list = document.getElementById('itemsList');
    document.getElementById('totalBadge').textContent = inventory.reduce((s, i) => s + i.count, 0) + ' items';
    
    if (inventory.length === 0) {
      list.innerHTML = '<div style="text-align:center; padding:40px; color:#ccc;">No items yet</div>';
      return;
    }

    list.innerHTML = inventory.map(item => `
      <div class="item-card">
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-meta">${item.barcode} | ${item.detail}</div>
        </div>
        <div class="qty-box">
          <button class="btn-q" onclick="adjust('${item.barcode}', -1)">-</button>
          <span class="qty-val">${item.count}</span>
          <button class="btn-q" onclick="adjust('${item.barcode}', 1)">+</button>
        </div>
      </div>
    `).join('');
  }

  function openModal(bc, name, detail) {
    document.getElementById('inBarcode').value = bc || "";
    document.getElementById('inName').value = name || "";
    document.getElementById('inDetail').value = detail || "";
    document.getElementById('modal').classList.add('show');
  }

  function saveData() {
    const barcode = document.getElementById('inBarcode').value;
    const name = document.getElementById('inName').value;
    const detail = document.getElementById('inDetail').value;

    if (!name || !barcode) return alert("Please fill Name and Barcode");

    const existing = inventory.find(i => i.barcode === barcode);
    if (existing) {
      existing.count++;
    } else {
      inventory.unshift({ barcode, name, detail, count: 1 });
    }

    localStorage.setItem('stock_v2', JSON.stringify(inventory));
    render();
    closeModal();
    document.getElementById('statusText').textContent = 'ITEM SAVED';
  }

  function adjust(bc, delta) {
    const item = inventory.find(i => i.barcode === bc);
    if (item) {
      item.count = Math.max(0, item.count + delta);
      localStorage.setItem('stock_v2', JSON.stringify(inventory));
      render();
    }
  }

  function closeModal() { document.getElementById('modal').classList.remove('show'); }

  async function toggleScanner() {
    const btn = document.getElementById('scanBtn');
    if (!isScanning) {
      html5QrCode = new Html5Qrcode("reader");
      document.getElementById('placeholder').style.display = 'none';
      await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (code) => {
        onScan(code);
      });
      isScanning = true;
      btn.textContent = "STOP";
    } else {
      await html5QrCode.stop();
      isScanning = false;
      btn.textContent = "LIVE SCAN";
      document.getElementById('placeholder').style.display = 'flex';
    }
  }

  function onScan(code) {
    const existing = inventory.find(i => i.barcode === code);
    if (existing) {
        adjust(code, 1);
        if (navigator.vibrate) navigator.vibrate(100);
    } else {
        openModal(code, "", "");
        toggleScanner(); // Stop scanner to let user fill info
    }
  }

  render();
</script>
</body>
</html>
